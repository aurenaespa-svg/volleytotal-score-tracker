<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VolleyTotal Score Tracker</title>
  <style>

:root {
  --bg: #0b1120;
  --panel: #131c2f;
  --panel-2: #0f1727;
  --muted: #94a3b8;
  --text: #f8fafc;
  --accent: #f59e0b;
  --accent-2: #2563eb;
  --accent-3: #0ea5e9;
  --danger: #ef4444;
  --success: #22c55e;
  --warn: #f59e0b;
  --border: #243047;
  --shadow: 0 10px 30px rgba(0,0,0,.28);
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: linear-gradient(180deg, #08101d, #0b1120 28%, #0b1120);
  color: var(--text);
}
button, input, select, textarea { font: inherit; }
button {
  background: #22314c;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 9px 12px;
  cursor: pointer;
  transition: transform .12s ease, filter .12s ease, background .12s ease;
}
button:hover { filter: brightness(1.08); }
button:active { transform: translateY(1px); }
button.primary { background: var(--accent-2); }
button.success { background: var(--success); color: #04140b; font-weight: 800; }
button.danger { background: var(--danger); }
button.warn { background: var(--warn); color: #281700; font-weight: 700; }
button.ghost { background: rgba(15,23,39,.56); }
button.small { padding: 6px 9px; font-size: 13px; }
button.icon {
  width: 42px; height: 42px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 18px; border-radius: 999px;
}
input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0a1220;
  color: var(--text);
}
textarea { resize: vertical; min-height: 74px; }
label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
small, .muted { color: var(--muted); }
.hidden { display: none !important; }
.app-shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }
.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 14px 8px; border-bottom: 1px solid rgba(255,255,255,.06);
  background: rgba(6, 10, 20, .7); backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 20;
}
.brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
.brand-logo {
  height: 38px; width: auto; display: block; object-fit: contain;
  filter: drop-shadow(0 4px 10px rgba(0,0,0,.2));
}
.brand-copy { min-width: 0; }
.brand-copy h1 { margin: 0; font-size: 18px; line-height: 1.15; }
.brand-copy .muted { font-size: 12px; }
.main {
  display: grid;
  grid-template-rows: auto 1fr;
  min-height: 0;
}
.video-area { padding: 10px 12px 0; }
.video-panel, .control-panel {
  background: rgba(19,28,47,.96);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: var(--shadow);
}
.video-panel {
  display: grid;
  grid-template-rows: auto auto auto;
  overflow: visible;
  width: fit-content;
  max-width: 100%;
}
.video-header {
  display: flex; justify-content: space-between; gap: 12px; align-items: end;
  padding: 10px 12px 6px;
}
.video-header-note {
  text-align: right;
  max-width: 48ch;
}
.card-lite {
  background: rgba(15, 23, 39, .7);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 12px;
}
.server-prompt {
  margin: 0 12px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.check-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.checkbox-inline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}
.checkbox-inline input {
  width: auto;
}
.server-config-list {
  display: grid;
  gap: 8px;
}
.set-server-row {
  display: grid;
  grid-template-columns: minmax(120px, 160px) minmax(0, 1fr);
  gap: 10px;
  align-items: center;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #0a1220;
}
.video-wrap {
  background: black;
  position: relative;
  min-width: 360px;
  min-height: 220px;
  width: min(100%, 960px);
  height: min(58vh, 540px);
  resize: both;
  overflow: hidden;
  border-radius: 14px;
  margin: 0 12px;
  border: 1px solid rgba(255,255,255,.08);
}
video {
  width: 100%; height: 100%; object-fit: contain; background: black;
}
.video-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 8px;
  pointer-events: none;
}
.overlay-top, .overlay-bottom {
  display: flex; justify-content: space-between; gap: 8px; align-items: flex-start;
}
.overlay-actions {
  pointer-events: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.compact-top { align-items: flex-start; }
.compact-actions { max-width: 70%; }
.overlay-chip {
  background: rgba(10, 16, 30, .72);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 999px;
  padding: 4px 9px;
  font-size: 12px;
  line-height: 1.1;
  backdrop-filter: blur(6px);
}
.status-chip.pending { border-color: rgba(245,158,11,.45); }
.status-chip.ready { border-color: rgba(34,197,94,.45); }
.compact-bottom { align-items: flex-end; position: relative; }
.overlay-dock {
  width: 100%;
  pointer-events: auto;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  background: rgba(7, 12, 22, .62);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  padding: 6px 8px;
  backdrop-filter: blur(8px);
}
.overlay-dock.locked { opacity: .82; }
.overlay-dock-main, .overlay-dock-side {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.compact-btn {
  min-height: 34px;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 13px;
  font-weight: 800;
}
.compact-btn span { margin-left: 4px; }
.compact-team {
  max-width: 160px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.serve-btn {
  background: var(--warn); color: #241500; border-color: rgba(0,0,0,.15); font-weight: 800;
}
.mini-icon {
  width: 34px; height: 34px; font-size: 15px;
  border-radius: 999px;
}
.lock-btn.locked { background: rgba(239,68,68,.9); }
.overlay-comment-pop {
  position: absolute;
  right: 0;
  bottom: 48px;
  width: min(330px, 62%);
  pointer-events: auto;
  background: rgba(7, 12, 22, .82);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 14px;
  padding: 8px;
  backdrop-filter: blur(8px);
}
.overlay-comment-pop.locked { opacity: .82; }
.overlay-comment-head {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.overlay-comment-pop textarea {
  background: rgba(10,18,32,.92);
  min-height: 64px;
  padding: 8px 10px;
}
.comment-status { margin-top: 6px; font-size: 12px; }
.hide-md, .hide-sm { display: inline-flex; }
.scrub-bar {
  display: grid; grid-template-columns: 88px 1fr 88px; gap: 10px; align-items: center;
  padding: 10px 12px 8px;
}
.range-time { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--muted); }
.controls-grid {
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  padding: 0 12px 12px;
}
.controls-grid select, .controls-grid input { width: auto; min-width: 88px; }
.bottom-area { padding: 10px 12px 12px; min-height: 0; }
.control-panel {
  display: grid; grid-template-rows: auto auto 1fr;
  gap: 10px; padding: 12px; min-height: 0;
}
.tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn.active { background: var(--accent-2); }
.summary {
  display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(220px, .75fr) minmax(220px, .75fr);
  gap: 10px;
}
.card {
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 16px; padding: 12px;
}
.score-strip {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.score-big { font-size: clamp(20px, 3vw, 30px); font-weight: 900; margin: 3px 0; }
.sets-big { font-size: 18px; font-weight: 800; }
.team-line { display: flex; justify-content: space-between; gap: 8px; }
.content-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; min-height: 280px; }
.stack { display: grid; gap: 12px; min-height: 0; }
.row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
.row-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
.row-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
.capture-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.log-list, .match-list { max-height: 380px; overflow: auto; display: grid; gap: 8px; }
.log-item, .match-item {
  background: #0a1220; border: 1px solid var(--border); border-radius: 14px; padding: 10px;
}
.log-item.active { border-color: var(--accent-2); box-shadow: 0 0 0 1px var(--accent-2) inset; }
.log-top { display: flex; justify-content: space-between; gap: 10px; }
.log-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.footer { padding: 8px 16px 16px; color: var(--muted); font-size: 12px; }
.empty { border: 1px dashed var(--border); border-radius: 14px; padding: 16px; color: var(--muted); }
.credit-box details { background: #0a1220; border: 1px solid var(--border); border-radius: 14px; padding: 8px 10px; }
.credit-box summary { cursor: pointer; color: var(--muted); }
.credit-box .credit-copy { margin-top: 10px; color: var(--text); }
hr.sep { border: none; border-top: 1px solid var(--border); margin: 0; }
@media (max-width: 1100px) {
  .summary { grid-template-columns: 1fr; }
  .content-grid { grid-template-columns: 1fr; }
}
@media (max-width: 900px) {
  .hide-md { display: none; }
  .compact-team { max-width: 124px; }
}
@media (max-width: 720px) {
  .server-prompt, .video-header, .set-server-row { grid-template-columns: 1fr; display: grid; }
  .video-header-note { text-align: left; max-width: none; }
  .row, .row-4, .row-3, .capture-buttons { grid-template-columns: 1fr; }
  .video-wrap { min-width: 280px; width: 100%; height: 42vh; }
  .scrub-bar { grid-template-columns: 72px 1fr 72px; }
  .hide-sm { display: none; }
  .overlay-dock { padding: 5px 6px; }
  .overlay-dock-main { gap: 5px; }
  .compact-btn { padding: 6px 8px; font-size: 12px; }
  .compact-team { max-width: 96px; }
  .overlay-comment-pop { width: min(300px, 80%); bottom: 44px; }
}

  function normalizeProject(project) {
    const normalized = structuredClone(project || {});
    normalized.version = Math.max(3, normalized.version || 1);
    normalized.meta = {
      competition: '', date: '', teamA: 'Equipo A', teamB: 'Equipo B',
      ...(normalized.meta || {}),
    };
    normalized.rules = {
      bestOf: 5,
      setsToWin: 3,
      regularSetPoints: 25,
      finalSetPoints: 15,
      winByTwo: true,
      specialMode: false,
      decidingSetNumber: normalized.rules?.bestOf || 5,
      decidingSetServeByDraw: true,
      ...(normalized.rules || {}),
    };
    normalized.initial = {
      firstServer: 'A', startSet: 1, startScoreA: 0, startScoreB: 0, startSetsA: 0, startSetsB: 0,
      ...(normalized.initial || {}),
    };
    normalized.setStartServerOverrides = { ...(normalized.setStartServerOverrides || {}) };
    normalized.rallies = (normalized.rallies || []).map(r => ({ note: '', ...r }));
    normalized.manualSetEnds = normalized.manualSetEnds || [];
    normalized.videoFingerprint = normalized.videoFingerprint || null;
    normalized.savedAt = normalized.savedAt || null;
    if (!normalized.rules.decidingSetNumber || normalized.rules.decidingSetNumber < normalized.initial.startSet) {
      normalized.rules.decidingSetNumber = normalized.rules.bestOf || 5;
    }
    return normalized;
  }

  function bindEvents() {
    const $ = (id) => document.getElementById(id);
    const video = $('video');

    const byId = ['loadVideoBtn','loadJsonBtn','saveJsonBtn','exportCsvBtn','newProjectBtn'];
    if ($('loadVideoBtn')) $('loadVideoBtn').onclick = () => $('videoFileInput').click();
    if ($('loadJsonBtn')) $('loadJsonBtn').onclick = () => $('jsonFileInput').click();
    if ($('saveJsonBtn')) $('saveJsonBtn').onclick = saveProjectJson;
    if ($('exportCsvBtn')) $('exportCsvBtn').onclick = exportCsv;
    if ($('newProjectBtn')) $('newProjectBtn').onclick = () => {
      if (!confirm('Se creará un proyecto nuevo. ¿Continuar?')) return;
      state.project = createEmptyProject();
      state.videoFile = null;
      if (state.videoUrl) URL.revokeObjectURL(state.videoUrl);
      state.videoUrl = null;
      state.pendingServeTime = null;
      state.pendingComment = '';
      state.selectedRallyId = null;
      state.undoStack = [];
      state.redoStack = [];
      video.removeAttribute('src');
      render();
    };

    if ($('videoFileInput')) $('videoFileInput').onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      await loadVideoFile(file);
      e.target.value = '';
    };

    if ($('jsonFileInput')) $('jsonFileInput').onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed || !parsed.rallies || !parsed.meta || !parsed.rules) {
        alert('JSON no válido.');
        return;
      }
      state.project = normalizeProject(parsed);
      state.pendingServeTime = null;
      state.pendingComment = '';
      state.selectedRallyId = null;
      state.undoStack = [];
      state.redoStack = [];
      state.lastLoadedProjectName = file.name;
      render();
      e.target.value = '';
      alert('Proyecto cargado. Ahora selecciona manualmente el vídeo local correspondiente.');
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => { state.activeTab = btn.dataset.tab; render(); };
    });

    $('playPauseBtn').onclick = () => togglePlay();
    $('back1sBtn').onclick = () => stepTime(-1);
    $('fwd1sBtn').onclick = () => stepTime(1);
    $('back5sBtn').onclick = () => stepTime(-5);
    $('fwd5sBtn').onclick = () => stepTime(5);
    $('backFrameBtn').onclick = () => stepFrame(-1);
    $('fwdFrameBtn').onclick = () => stepFrame(1);
    $('overlayServeBtn').onclick = markServe;
    $('overlayWinnerABtn').onclick = () => registerWinner('A');
    $('overlayWinnerBBtn').onclick = () => registerWinner('B');
    $('overlayFixBtn').onclick = fixLastRally;
    $('overlayUndoBtn').onclick = undo;
    $('overlayRedoBtn').onclick = redo;
    $('overlayLockBtn').onclick = toggleOverlayLock;
    $('fullscreenBtn').onclick = () => video.requestFullscreen?.();
    if ($('assignCurrentSetServerABtn')) $('assignCurrentSetServerABtn').onclick = () => assignCurrentSetServer('A');
    if ($('assignCurrentSetServerBBtn')) $('assignCurrentSetServerBBtn').onclick = () => assignCurrentSetServer('B');

    const commentInput = $('pendingCommentInput');
    if (commentInput) commentInput.oninput = (e) => { state.pendingComment = e.target.value; };
    if ($('overlayCommentToggleBtn')) $('overlayCommentToggleBtn').onclick = () => { state.showCommentBox = !state.showCommentBox; render(); };
    if ($('overlayCommentCloseBtn')) $('overlayCommentCloseBtn').onclick = () => { state.showCommentBox = false; render(); };

    $('rateSelect').onchange = (e) => { video.playbackRate = parseFloat(e.target.value); };
    $('fpsInput').onchange = (e) => {
      const v = parseInt(e.target.value, 10);
      if (v > 0) state.frameRate = v;
      render();
    };

    $('seekRange').oninput = (e) => {
      if (!Number.isFinite(video.duration)) return;
      video.currentTime = (parseFloat(e.target.value) / 1000) * video.duration;
    };

    video.onloadedmetadata = () => {
      syncVideoUI();
      if (state.project.videoFingerprint) validateCurrentVideoAgainstProject();
    };
    video.ontimeupdate = syncVideoUI;
    video.onseeked = syncVideoUI;
    video.onplay = syncVideoUI;
    video.onpause = syncVideoUI;

    bindSearchEvents();
    bindEditorEvents();
    bindConfigEvents();
    bindHistoryJumpEvents();

    document.onkeydown = (e) => {
      const tag = document.activeElement?.tagName;
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      if (e.key.toLowerCase() === 's') { e.preventDefault(); markServe(); }
      if (e.key.toLowerCase() === 'a') { e.preventDefault(); registerWinner('A'); }
      if (e.key.toLowerCase() === 'l') { e.preventDefault(); registerWinner('B'); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); e.shiftKey ? stepFrame(-1) : stepTime(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); e.shiftKey ? stepFrame(1) : stepTime(1); }
    };
  }

  function bindSearchEvents() {
    const btn = document.getElementById('searchScoreBtn');
    if (!btn) return;
    btn.onclick = () => {
      const setN = parseInt(document.getElementById('searchSet').value, 10);
      const a = parseInt(document.getElementById('searchA').value, 10);
      const b = parseInt(document.getElementById('searchB').value, 10);
      const results = computeRallyStates().filter(x => x.setNumber === setN && x.scoreA === a && x.scoreB === b);
      const box = document.getElementById('searchResults');
      if (!results.length) {
        box.innerHTML = '<div class="empty">No hay coincidencias para ese marcador.</div>';
        return;
      }
      box.innerHTML = results.map(r => `
        <div class="match-item">
          <div><strong>Set ${r.setNumber} · ${r.scoreA}-${r.scoreB}</strong></div>
          <div class="muted">Rally ${r.index + 1} · saque ${formatTime(r.serveTime)}</div>
          ${r.note ? `<div class="muted" style="margin-top:6px;">Comentario: ${escapeHtml(r.note)}</div>` : ''}
          <div class="log-actions"><button class="jump-search-btn small" data-id="${r.id}">Ir al saque</button></div>
        </div>
      `).join('');
      box.querySelectorAll('.jump-search-btn').forEach(btn => btn.onclick = () => jumpToRally(btn.dataset.id));
    };
  }

  function bindEditorEvents() {
    const saveBtn = document.getElementById('saveEditBtn');
    if (saveBtn) saveBtn.onclick = saveEditedRally;
    const delBtn = document.getElementById('deleteEditBtn');
    if (delBtn) delBtn.onclick = deleteSelectedRally;
    const insBtn = document.getElementById('insertAfterEditBtn');
    if (insBtn) insBtn.onclick = insertAfterSelectedRally;
    document.querySelectorAll('.select-rally-btn').forEach(btn => btn.onclick = () => { state.selectedRallyId = btn.dataset.id; render(); });
  }

  function bindConfigEvents() {
    const btn = document.getElementById('applyConfigBtn');
    if (!btn) return;
    btn.onclick = () => {
      const next = structuredClone(state.project);
      next.meta.competition = document.getElementById('competitionInput').value.trim();
      next.meta.date = document.getElementById('dateInput').value;
      next.meta.teamA = document.getElementById('teamAInput').value.trim() || 'Equipo A';
      next.meta.teamB = document.getElementById('teamBInput').value.trim() || 'Equipo B';
      next.rules.bestOf = parseInt(document.getElementById('bestOfInput').value, 10) || 5;
      next.rules.setsToWin = parseInt(document.getElementById('setsToWinInput').value, 10) || Math.ceil(next.rules.bestOf / 2);
      next.rules.regularSetPoints = parseInt(document.getElementById('regularSetPointsInput').value, 10) || 25;
      next.rules.finalSetPoints = parseInt(document.getElementById('finalSetPointsInput').value, 10) || 15;
      next.rules.decidingSetNumber = parseInt(document.getElementById('decidingSetNumberInput').value, 10) || next.rules.bestOf || 5;
      next.rules.decidingSetServeByDraw = !!document.getElementById('decidingSetServeByDrawInput').checked;
      next.initial.firstServer = document.getElementById('firstServerInput').value;
      next.setStartServerOverrides = collectSetServerOverrides(next.rules.bestOf);
      const fps = parseInt(document.getElementById('fpsConfigInput').value, 10);
      if (fps > 0) state.frameRate = fps;
      pushUndo();
      state.project = normalizeProject(next);
      render();
    };
    const manualBtn = document.getElementById('manualSetEndBtn');
    if (manualBtn) manualBtn.onclick = manualSetEnd;
  }

  function bindHistoryJumpEvents() {
    document.querySelectorAll('.jump-rally-btn').forEach(btn => btn.onclick = () => jumpToRally(btn.dataset.id));
  }

  async function loadVideoFile(file) {
    state.videoFile = file;
    if (state.videoUrl) URL.revokeObjectURL(state.videoUrl);
    state.videoUrl = URL.createObjectURL(file);
    const video = document.getElementById('video');
    video.src = state.videoUrl;
    await waitForMetadata(video);
    state.project.videoFingerprint = {
      name: file.name,
      size: file.size,
      duration: round(video.duration, 3),
      type: file.type || '',
      capturedAt: new Date().toISOString(),
    };
    render();
  }

  function validateCurrentVideoAgainstProject() {
    const fp = state.project.videoFingerprint;
    const video = document.getElementById('video');
    if (!fp || !state.videoFile || !Number.isFinite(video.duration)) return;
    const sameName = fp.name === state.videoFile.name;
    const sameSize = fp.size === state.videoFile.size;
    const sameDuration = Math.abs(fp.duration - round(video.duration, 3)) < 0.05;
    if (!(sameName && sameSize && sameDuration)) {
      alert('Advertencia: el vídeo cargado no coincide con la huella del proyecto (nombre, tamaño o duración).');
    }
  }

  function toggleOverlayLock() {
    state.overlayLocked = !state.overlayLocked;
    render();
  }

  function markServe() {
    if (state.overlayLocked) return;
    const current = getCurrentState();
    if (current.server == null) {
      alert(`Antes de registrar el saque debes asignar el sacador inicial del set ${current.setNumber}.`);
      return;
    }
    const video = document.getElementById('video');
    if (!Number.isFinite(video.currentTime)) {
      alert('Carga un vídeo antes de registrar un saque.');
      return;
    }
    state.pendingServeTime = round(video.currentTime, 3);
    render();
  }

  function registerWinner(winner) {
    if (state.overlayLocked) return;
    const current = getCurrentState();
    if (current.server == null) {
      alert(`Antes de asignar el punto debes fijar el sacador inicial del set ${current.setNumber}.`);
      return;
    }
    if (state.pendingServeTime == null) {
      alert('Primero debes marcar el instante del saque.');
      return;
    }
    pushUndo();
    state.project.rallies.push({
      id: crypto.randomUUID(),
      serveTime: state.pendingServeTime,
      winner,
      note: state.pendingComment.trim(),
      createdAt: new Date().toISOString(),
    });
    state.pendingServeTime = null;
    state.pendingComment = '';
    state.selectedRallyId = state.project.rallies[state.project.rallies.length - 1].id;
    render();
  }

  function fixLastRally() {
    const last = state.project.rallies[state.project.rallies.length - 1];
    if (!last) { alert('No hay rallies para corregir.'); return; }
    state.selectedRallyId = last.id;
    state.activeTab = 'gestion';
    render();
  }

  function manualSetEnd() {
    const current = getCurrentState();
    const winner = prompt(`Finalizar set ${current.setNumber} manualmente. Ganador: A o B`, current.scoreA >= current.scoreB ? 'A' : 'B');
    if (!winner || !['A','B','a','b'].includes(winner)) return;
    pushUndo();
    state.project.manualSetEnds.push({
      rallyId: state.project.rallies[state.project.rallies.length - 1]?.id || null,
      setNumber: current.setNumber,
      winner: winner.toUpperCase(),
      scoreA: current.scoreA,
      scoreB: current.scoreB,
    });
    render();
  }

  function saveEditedRally() {
    const selected = getSelectedRally();
    if (!selected) return;
    const timeInput = document.getElementById('editServeTime');
    const winnerInput = document.getElementById('editWinner');
    const noteInput = document.getElementById('editNote');
    const newTime = parseFloat(timeInput.value);
    if (!Number.isFinite(newTime) || newTime < 0) { alert('Tiempo de saque no válido.'); return; }
    if (!confirm('Se recalcularán automáticamente los marcadores y turnos posteriores. ¿Continuar?')) return;
    pushUndo();
    selected.serveTime = round(newTime, 3);
    selected.winner = winnerInput.value;
    selected.note = noteInput.value;
    render();
  }

  function deleteSelectedRally() {
    const selected = getSelectedRally();
    if (!selected) return;
    if (!confirm('Se borrará el rally y se recalcularán automáticamente los marcadores y turnos posteriores. ¿Continuar?')) return;
    pushUndo();
    state.project.rallies = state.project.rallies.filter(r => r.id !== selected.id);
    state.selectedRallyId = null;
    render();
  }

  function insertAfterSelectedRally() {
    const selected = getSelectedRally();
    if (!selected) return;
    const serveTime = parseFloat(prompt('Tiempo de saque del nuevo rally (segundos):', String(selected.serveTime)));
    if (!Number.isFinite(serveTime) || serveTime < 0) return;
    const winner = prompt('Ganador del rally insertado: A o B', 'A');
    if (!winner || !['A','B','a','b'].includes(winner)) return;
    const note = prompt('Comentario del rally insertado (opcional):', '') || '';
    if (!confirm('Se insertará el rally y se recalcularán automáticamente los marcadores y turnos posteriores. ¿Continuar?')) return;
    pushUndo();
    const idx = state.project.rallies.findIndex(r => r.id === selected.id);
    state.project.rallies.splice(idx + 1, 0, {
      id: crypto.randomUUID(),
      serveTime: round(serveTime, 3),
      winner: winner.toUpperCase(),
      note,
      createdAt: new Date().toISOString(),
    });
    render();
  }

  function jumpToRally(id) {
    const rally = state.project.rallies.find(r => r.id === id);
    if (!rally) return;
    const video = document.getElementById('video');
    video.currentTime = rally.serveTime;
    state.selectedRallyId = id;
    render();
  }

  function togglePlay() {
    const video = document.getElementById('video');
    if (video.paused) video.play(); else video.pause();
  }
  function stepTime(delta) {
    const video = document.getElementById('video');
    video.currentTime = Math.max(0, (video.currentTime || 0) + delta);
  }
  function stepFrame(frames) { stepTime(frames / (state.frameRate || 30)); }

  function assignCurrentSetServer(server) {
    const current = getCurrentState();
    pushUndo();
    state.project.setStartServerOverrides = { ...(state.project.setStartServerOverrides || {}), [String(current.setNumber)]: server };
    render();
  }

  function collectSetServerOverrides(maxSets) {
    const overrides = {};
    for (let set = state.project.initial.startSet || 1; set <= maxSets; set += 1) {
      const input = document.getElementById(`setServerOverride_${set}`);
      if (!input) continue;
      if (input.value === 'A' || input.value === 'B') overrides[String(set)] = input.value;
    }
    return overrides;
  }

  function getCurrentState() {
    const list = computeRallyStates();
    if (!list.length) {
      const serverInfo = getSetStartServerInfo(state.project.initial.startSet || 1);
      return {
        setNumber: state.project.initial.startSet,
        scoreA: state.project.initial.startScoreA,
        scoreB: state.project.initial.startScoreB,
        setsA: state.project.initial.startSetsA,
        setsB: state.project.initial.startSetsB,
        server: serverInfo.server,
        serverSource: serverInfo.source,
      };
    }
    const last = list[list.length - 1];
    return {
      setNumber: last.nextSetNumber,
      scoreA: last.nextScoreA,
      scoreB: last.nextScoreB,
      setsA: last.nextSetsA,
      setsB: last.nextSetsB,
      server: last.nextServer,
      serverSource: last.nextServerSource,
    };
  }

  function computeRallyStates() {
    let setNumber = state.project.initial.startSet || 1;
    let scoreA = state.project.initial.startScoreA || 0;
    let scoreB = state.project.initial.startScoreB || 0;
    let setsA = state.project.initial.startSetsA || 0;
    let setsB = state.project.initial.startSetsB || 0;
    let serverInfo = getSetStartServerInfo(setNumber);

    const out = [];
    for (let i = 0; i < state.project.rallies.length; i++) {
      const rally = state.project.rallies[i];
      const serverBefore = serverInfo.server;
      const serverSource = serverInfo.source;
      if (rally.winner === 'A') scoreA += 1; else scoreB += 1;
      let nextSetNumber = setNumber;
      let nextScoreA = scoreA;
      let nextScoreB = scoreB;
      let nextSetsA = setsA;
      let nextSetsB = setsB;
      let nextServer = rally.winner;
      let nextServerSource = 'rally_winner';
      let setEnded = false;
      let endedByManual = false;

      const manual = state.project.manualSetEnds.find(x => x.rallyId === rally.id && x.setNumber === setNumber);
      if (manual) {
        setEnded = true;
        endedByManual = true;
      } else if (isSetWon(scoreA, scoreB, setNumber)) {
        setEnded = true;
      }

      if (setEnded) {
        if (scoreA > scoreB) nextSetsA += 1; else nextSetsB += 1;
        nextSetNumber += 1;
        nextScoreA = 0;
        nextScoreB = 0;
        const nextInfo = getSetStartServerInfo(nextSetNumber);
        nextServer = nextInfo.server;
        nextServerSource = nextInfo.source;
      }

      out.push({
        note: '',
        ...rally,
        index: i,
        setNumber,
        scoreA,
        scoreB,
        setsA,
        setsB,
        serverBefore,
        serverSource,
        nextSetNumber,
        nextScoreA,
        nextScoreB,
        nextSetsA,
        nextSetsB,
        nextServer,
        nextServerSource,
        setEnded,
        endedByManual,
      });

      setNumber = nextSetNumber;
      scoreA = nextScoreA;
      scoreB = nextScoreB;
      setsA = nextSetsA;
      setsB = nextSetsB;
      serverInfo = { server: nextServer, source: nextServerSource };
    }
    return out;
  }

  function isSetWon(scoreA, scoreB, setNumber) {
    const decidingSetNumber = getDecidingSetNumber();
    const isFinalSet = setNumber === decidingSetNumber;
    const target = isFinalSet ? state.project.rules.finalSetPoints : state.project.rules.regularSetPoints;
    const maxScore = Math.max(scoreA, scoreB);
    const minScore = Math.min(scoreA, scoreB);
    return maxScore >= target && (!state.project.rules.winByTwo || maxScore - minScore >= 2);
  }

  function getDecidingSetNumber() {
    return Math.max(state.project.initial.startSet || 1, parseInt(state.project.rules.decidingSetNumber, 10) || state.project.rules.bestOf || 5);
  }

  function getSetStartServerInfo(setNumber) {
    const key = String(setNumber);
    const overrides = state.project.setStartServerOverrides || {};
    if (overrides[key] === 'A' || overrides[key] === 'B') return { server: overrides[key], source: 'manual' };
    if (setNumber === (state.project.initial.startSet || 1)) return { server: state.project.initial.firstServer || 'A', source: 'initial' };
    if (state.project.rules.decidingSetServeByDraw && setNumber === getDecidingSetNumber()) return { server: null, source: 'draw_required' };
    const previous = getSetStartServerInfo(setNumber - 1);
    if (previous.server == null) return { server: null, source: 'pending_previous' };
    return { server: oppositeTeam(previous.server), source: 'alternated' };
  }

  function getTeamLabel(team) {
    if (team === 'A') return state.project.meta.teamA;
    if (team === 'B') return state.project.meta.teamB;
    return 'Pendiente de asignar';
  }

  function getServerHelpText(setNumber, source) {
    if (source === 'manual') return `Sacador inicial del set ${setNumber} fijado manualmente.`;
    if (source === 'draw_required') return `Set ${setNumber} configurado como decisivo: hace falta asignar el saque por sorteo.`;
    if (source === 'alternated') return `Sacador inicial del set ${setNumber} alternado respecto al set anterior.`;
    if (source === 'initial') return `Sacador inicial base del partido.`;
    if (source === 'pending_previous') return `Hay un set anterior sin sacador inicial asignado.`;
    return 'Deducido automáticamente a partir del ganador del rally.';
  }

  function getSetAssignmentPrompt(setNumber) {
    return setNumber === getDecidingSetNumber() && state.project.rules.decidingSetServeByDraw
      ? 'Este set está marcado como decisivo y requiere asignación manual tras el sorteo.'
      : 'Puedes fijarlo manualmente para este set si quieres sobrescribir el cálculo automático.';
  }

  function oppositeTeam(team) { return team === 'A' ? 'B' : 'A'; }

  function renderSetServerConfig() {
    const maxSets = Math.max(state.project.rules.bestOf || 5, getDecidingSetNumber());
    const rows = [];
    for (let set = state.project.initial.startSet || 1; set <= maxSets; set += 1) {
      const info = getSetStartServerInfo(set);
      const override = (state.project.setStartServerOverrides || {})[String(set)] || (set === (state.project.initial.startSet || 1) ? state.project.initial.firstServer : 'AUTO');
      const autoLabel = info.server ? `${getTeamLabel(info.server)} (${info.source === 'alternated' ? 'alternado' : 'auto'})` : 'Pendiente de asignar';
      rows.push(`
        <div class="set-server-row">
          <div>
            <strong>Set ${set}</strong>
            <div class="muted">${escapeHtml(set === getDecidingSetNumber() && state.project.rules.decidingSetServeByDraw ? 'Set decisivo / sorteo' : 'Set ordinario')}</div>
          </div>
          <div class="set-server-select-wrap">
            <select id="setServerOverride_${set}">
              ${set === (state.project.initial.startSet || 1)
                ? `<option value="A" ${override==='A'?'selected':''}>${escapeHtml(state.project.meta.teamA)}</option><option value="B" ${override==='B'?'selected':''}>${escapeHtml(state.project.meta.teamB)}</option>`
                : `<option value="AUTO" ${override==='AUTO'?'selected':''}>Auto · ${escapeHtml(autoLabel)}</option><option value="A" ${override==='A'?'selected':''}>${escapeHtml(state.project.meta.teamA)}</option><option value="B" ${override==='B'?'selected':''}>${escapeHtml(state.project.meta.teamB)}</option>`}
            </select>
          </div>
        </div>`);
    }
    return rows.join('');
  }

  function renderRecentRallies(n) {
    const list = computeRallyStates().slice(-n).reverse();
    if (!list.length) return '<div class="empty">Todavía no hay rallies registrados.</div>';
    return list.map(r => renderRallyItem(r, true)).join('');
  }

  function renderAllRallies() {
    const list = computeRallyStates();
    if (!list.length) return '<div class="empty">Todavía no hay rallies registrados.</div>';
    return list.map(r => renderRallyItem(r, false)).join('');
  }

  function renderRallyItem(r, compact) {
    const selected = state.selectedRallyId === r.id ? 'active' : '';
    return `
      <div class="log-item ${selected}">
        <div class="log-top">
          <div><strong>Set ${r.setNumber} · ${r.scoreA}-${r.scoreB}</strong></div>
          <div class="muted">${formatTime(r.serveTime)}</div>
        </div>
        <div class="muted">Rally ${r.index + 1} · saca ${escapeHtml(getTeamLabel(r.serverBefore))} · punto para ${escapeHtml(getTeamLabel(r.winner))}${r.setEnded ? ' · fin de set' : ''}</div>
        ${r.note ? `<div style="margin-top:6px;">${escapeHtml(r.note)}</div>` : ''}
        ${compact ? '' : `<div class="log-actions"><button class="select-rally-btn small" data-id="${r.id}">Editar</button><button class="jump-rally-btn small" data-id="${r.id}">Ir al saque</button></div>`}
      </div>
    `;
  }

  function renderEditor() {
    const r = computeRallyStates().find(x => x.id === state.selectedRallyId);
    if (!r) return '<div class="empty">Selecciona un rally del historial para editarlo.</div>';
    return `
      <div class="stack" style="margin-top:10px;">
        <div><strong>Rally ${r.index + 1}</strong></div>
        <div class="row">
          <div><label>Tiempo del saque (s)</label><input id="editServeTime" type="number" step="0.001" min="0" value="${r.serveTime}" /></div>
          <div><label>Ganador</label><select id="editWinner"><option value="A" ${r.winner==='A'?'selected':''}>${escapeHtml(state.project.meta.teamA)}</option><option value="B" ${r.winner==='B'?'selected':''}>${escapeHtml(state.project.meta.teamB)}</option></select></div>
        </div>
        <div><label>Comentario</label><textarea id="editNote" rows="4">${escapeHtml(r.note || '')}</textarea></div>
        <div class="muted">Marcador registrado en este rally: set ${r.setNumber} · ${r.scoreA}-${r.scoreB}</div>
        <div class="log-actions">
          <button id="saveEditBtn" class="primary">Guardar cambios</button>
          <button id="insertAfterEditBtn">Insertar después</button>
          <button id="deleteEditBtn" class="danger">Borrar rally</button>
          <button class="jump-rally-btn" data-id="${r.id}">Ir al saque</button>
        </div>
      </div>
    `;
  }

  function saveProjectJson() {
    state.project.savedAt = new Date().toISOString();
    const blob = new Blob([JSON.stringify(state.project, null, 2)], { type: 'application/json' });
    downloadBlob(blob, safeFileName(`${state.project.meta.teamA}_vs_${state.project.meta.teamB || 'partido'}.json`));
  }

  function exportCsv() {
    const rows = computeRallyStates();
    const headers = ['rally','set','score_a','score_b','sets_a','sets_b','serve_time','server_before','server_before_label','winner','winner_label','comment','set_ended','manual_set_end','team_a','team_b'];
    const csv = [headers.join(',')].concat(rows.map(r => [
      r.index + 1,
      r.setNumber,
      r.scoreA,
      r.scoreB,
      r.setsA,
      r.setsB,
      r.serveTime,
      r.serverBefore || '',
      csvEscape(getTeamLabel(r.serverBefore)),
      r.winner,
      csvEscape(getTeamLabel(r.winner)),
      csvEscape(r.note || ''),
      r.setEnded ? 1 : 0,
      r.endedByManual ? 1 : 0,
      csvEscape(state.project.meta.teamA),
      csvEscape(state.project.meta.teamB),
    ].join(','))).join('\n');
    downloadBlob(new Blob([csv], { type: 'text/csv;charset=utf-8' }), safeFileName(`${state.project.meta.teamA}_vs_${state.project.meta.teamB}_rallies.csv`));
  }

  function getSelectedRally() { return state.project.rallies.find(r => r.id === state.selectedRallyId); }

  function syncVideoUI() {
    const video = document.getElementById('video');
    const current = document.getElementById('currentTimeLabel');
    const duration = document.getElementById('durationLabel');
    const seek = document.getElementById('seekRange');
    const playBtn = document.getElementById('playPauseBtn');
    if (!video || !current || !duration || !seek) return;
    current.textContent = formatTime(video.currentTime || 0);
    duration.textContent = Number.isFinite(video.duration) ? formatTime(video.duration) : '00:00.000';
    if (playBtn) playBtn.textContent = video.paused ? '▶' : '⏸';
    if (Number.isFinite(video.duration) && video.duration > 0) {
      seek.value = String(Math.round((video.currentTime / video.duration) * 1000));
    }
  }

  function pushUndo() {
    state.undoStack.push(JSON.stringify(state.project));
    if (state.undoStack.length > 100) state.undoStack.shift();
    state.redoStack = [];
  }
  function undo() {
    if (!state.undoStack.length) return;
    state.redoStack.push(JSON.stringify(state.project));
    state.project = normalizeProject(JSON.parse(state.undoStack.pop()));
    render();
  }
  function redo() {
    if (!state.redoStack.length) return;
    state.undoStack.push(JSON.stringify(state.project));
    state.project = normalizeProject(JSON.parse(state.redoStack.pop()));
    render();
  }

  function formatTime(sec) {
    sec = Math.max(0, sec || 0);
    const mins = Math.floor(sec / 60);
    const secs = Math.floor(sec % 60);
    const ms = Math.round((sec - Math.floor(sec)) * 1000);
    return `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
  }
  function round(n, d = 3) { return Number(n.toFixed(d)); }
  function safeFileName(s) { return s.replace(/[^a-z0-9_\-.]+/gi, '_'); }
  function csvEscape(v) { return `"${String(v).replaceAll('"', '""')}"`; }
  function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function escapeAttr(s) { return escapeHtml(s); }
  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }
  function waitForMetadata(video) {
    return new Promise(resolve => {
      if (Number.isFinite(video.duration) && video.duration > 0) return resolve();
      video.onloadedmetadata = () => { syncVideoUI(); if (state.project.videoFingerprint) validateCurrentVideoAgainstProject(); resolve(); };
    });
  }
  function videoMetaLabel() {
    if (!state.videoFile || !state.project.videoFingerprint) return 'Sin vídeo o sin huella registrada.';
    return `${state.project.videoFingerprint.name} · ${Math.round(state.project.videoFingerprint.size / 1024 / 1024 * 10)/10} MB · ${state.project.videoFingerprint.duration}s`;
  }
})();

  </script>
</body>
